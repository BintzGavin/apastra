name: Delivery Sync
on:
  workflow_call:
    inputs:
      promotion_record_path:
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch Promotion Record
        run: |
          git fetch origin promptops-artifacts || true
          git checkout origin/promptops-artifacts -- ${{ inputs.promotion_record_path }} || true

      - name: Sync to Targets
        run: |
          read_yaml() {
            ruby -ryaml -e 'data = YAML.load_file(ARGV[0]) || {}; value = data.dig(*ARGV[1].split(".")); puts value unless value.nil?' "$1" "$2"
          }

          record="${{ inputs.promotion_record_path }}"
          if [ ! -f "$record" ]; then
            echo "::error::Promotion record not found at $record"
            exit 1
          fi

          CHANNEL=$(jq -r .channel "$record")
          DIGEST=$(jq -r .digest "$record")
          echo "Promoted digest $DIGEST to channel $CHANNEL"

          for target in promptops/delivery/*.yaml; do
            TARGET_CHANNEL=$(read_yaml "$target" channel 2>/dev/null || echo "")
            if [ "$TARGET_CHANNEL" == "$CHANNEL" ]; then
               TYPE=$(read_yaml "$target" type)
               REPO=$(read_yaml "$target" repo)
               echo "Executing sync for $TYPE to $REPO"
            fi
          done
