baseline: prod current
missing_report: warn   # warn (default) or block
rules:
  - metric: exact_match
    floor: 0.8
    allowed_delta: 0.05
    direction: higher_is_better
    severity: blocker
  - metric: latency_ms
    floor: 2000
    allowed_delta: 200
    direction: lower_is_better
    severity: warning