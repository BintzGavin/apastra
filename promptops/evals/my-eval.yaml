id: summarize-quick
prompt: "Summarize the following text in {{max_length}} or fewer words: {{text}}"
cases:
  - case_id: short-article
    inputs:
      text: "The quick brown fox jumps over the lazy dog."
      max_length: 5
    assert:
      - type: icontains
        value: "fox"
thresholds:
  pass_rate: 1.0
