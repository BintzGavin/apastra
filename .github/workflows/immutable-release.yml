name: Immutable Release
on:
  push:
    tags:
      - '*'
  workflow_call:

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package Prompts
        id: package
        run: |
          tar -czvf promptops.tar.gz promptops/
          DIGEST=$(sha256sum promptops.tar.gz | awk '{print $1}')
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Attest Build Provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: 'promptops.tar.gz'

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
          DIGEST: ${{ steps.package.outputs.digest }}
        run: |
          gh release create "$TAG_NAME" promptops.tar.gz \
            --title "Release $TAG_NAME" \
            --notes "Immutable release for $TAG_NAME. Digest: $DIGEST" \
            --generate-notes
