name: Promote
on:
  workflow_dispatch:
    inputs:
      digest:
        description: 'The content digest of the promoted prompt package'
        required: true
      channel:
        description: 'Target distribution channel (e.g., prod, staging)'
        required: true
      evidence_refs:
        description: 'Comma-separated URIs linking to regression reports or run artifacts'
        required: true
  release:
    types: [published]

jobs:
  record-promotion:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      filepath: ${{ steps.generate.outputs.filepath }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: promptops-artifacts

      - name: Enforce Approval
        env:
          INPUT_DIGEST: ${{ github.event.inputs.digest }}
          RELEASE_TAG: release-tag:${{ github.event.release.tag_name }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            TARGET_DIGEST="$INPUT_DIGEST"
          else
            TARGET_DIGEST="$RELEASE_TAG"
          fi
          echo "Checking for approval record matching digest: $TARGET_DIGEST"
          APPROVED=""
          if [ -d "approvals" ]; then
            APPROVED=$(cat approvals/*.json 2>/dev/null | jq -r --arg digest "$TARGET_DIGEST" 'select(.revision_ref == $digest and .decision == "approved" and .checks_passed == true) | .decision' 2>/dev/null | head -n 1)
          fi
          if [ "$APPROVED" != "approved" ]; then
            echo "::error::Promotion denied: No matching approval state record found for $TARGET_DIGEST."
            exit 1
          fi
          echo "Approval verified."

      - name: Generate Promotion Record
        id: generate
        env:
          INPUT_DIGEST: ${{ github.event.inputs.digest }}
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_EVIDENCE_REFS: ${{ github.event.inputs.evidence_refs }}
          RELEASE_TAG: release-tag:${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          ACTOR: ${{ github.actor }}
        run: |
          mkdir -p promotions
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          ID=$(uuidgen || echo $GITHUB_RUN_ID)
          FILEPATH="promotions/${TIMESTAMP}-${ID}.json"

          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            EVIDENCE_REFS=$(echo "$INPUT_EVIDENCE_REFS" | jq -R 'split(",") | map(gsub("^\\s+|\\s+$";""))')
            jq -n \
              --arg id "$ID" \
              --arg timestamp "$TIMESTAMP" \
              --arg digest "$INPUT_DIGEST" \
              --arg channel "$INPUT_CHANNEL" \
              --arg approver "$ACTOR" \
              --argjson evidence_refs "$EVIDENCE_REFS" \
              '{id: $id, timestamp: $timestamp, digest: $digest, channel: $channel, approver: $approver, evidence_refs: $evidence_refs}' > "$FILEPATH"
          else
            jq -n \
              --arg id "$ID" \
              --arg timestamp "$TIMESTAMP" \
              --arg digest "$RELEASE_TAG" \
              --arg channel "release" \
              --arg approver "$ACTOR" \
              --argjson evidence_refs "[\"$RELEASE_URL\"]" \
              '{id: $id, timestamp: $timestamp, digest: $digest, channel: $channel, approver: $approver, evidence_refs: $evidence_refs}' > "$FILEPATH"
          fi

          echo "filepath=$FILEPATH" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Commit Promotion Record
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.generate.outputs.filepath }}"
          git commit -m "chore(governance): append promotion record ${{ steps.generate.outputs.timestamp }}"
          git push

  deliver:
    needs: record-promotion
    uses: ./.github/workflows/deliver.yml
    with:
      promotion_record_path: ${{ needs.record-promotion.outputs.filepath }}
