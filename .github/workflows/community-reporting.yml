name: Community Reporting Triage

on:
  issues:
    types: [opened]

jobs:
  triage-report:
    if: contains(github.event.issue.labels.*.name, 'moderation-report')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      issues: write
    steps:
      - name: Add Acknowledgment Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --body "Thank you for submitting a moderation report. Our governance team will review this shortly."

      - name: Assign to Governance Admins
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue edit ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} \
            --add-assignee apastra,governance-admins
