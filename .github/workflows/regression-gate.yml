name: Regression Gate
on:
  pull_request:
    branches: [main]
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
      - name: Check Regression Report Status
        run: |
          REPORT="derived-index/regressions/regression_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "::warning::Regression report missing! The underlying engine may not be implemented yet. Skipping check."
            exit 0
          fi
          STATUS=$(jq -r .status "$REPORT")
          if [ "$STATUS" = "pass" ]; then
            echo "Regression passed."
            exit 0
          else
            echo "Regression failed or warning."
            exit 1
          fi
