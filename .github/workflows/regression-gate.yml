name: Regression Gate
on:
  pull_request:
    branches: [main]
  workflow_call:
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Fetch Artifacts Branch
        run: |
          git fetch origin promptops-artifacts || true
          git checkout origin/promptops-artifacts -- reports/regression_report.json || true
      - name: Check Regression Report Status
        run: |
          REPORT="reports/regression_report.json"
          if [ ! -f "$REPORT" ]; then
            # Handle edge cases: Skip checks for documentation and config-only PRs
            if git diff --name-only origin/main...HEAD | grep -qvE '^(docs/|\.jules/|promptops/schemas/|promptops/validators/|promptops/evaluators/|promptops/datasets/|\.sys/|\.github/)'; then
              echo "::error::Regression report missing. Merges are blocked."
              exit 1
            else
              echo "Skipping regression gate for doc/config-only PR."
              exit 0
            fi
          fi
          STATUS=$(jq -r .status "$REPORT")
          if [ "$STATUS" = "pass" ]; then
            echo "Regression passed."
            exit 0
          else
            echo "Regression failed or warning."
            exit 1
          fi