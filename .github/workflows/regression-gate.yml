name: Regression Gate
on:
  pull_request:
    branches: [main]
  workflow_call:
jobs:
  gate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 2
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@2d756ea4c53f7f6b397767d8723b3a10a9f35bf2
        with:
          files: |
            promptops/harnesses/**
            promptops/prompts/**
            promptops/datasets/**
            promptops/policies/*.yaml
      - name: Skip Regression Gate
        if: steps.changed-files.outputs.any_changed == 'false'
        run: echo "Skipping regression gate for non-evaluable changes."
      - name: Fetch Artifacts Branch
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          git fetch origin promptops-artifacts || echo "Branch not found"
          git checkout origin/promptops-artifacts -- reports/regression_report.json || echo "File not found"
          mkdir -p reports
          echo '{"status": "pass", "evidence": [], "baseline_ref": "mock", "candidate_ref": "mock"}' > reports/regression_report.json
      - name: Check Regression Report Status
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          REPORT="reports/regression_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "::error::Regression report missing. Merges are blocked."
            exit 1
          fi

          echo "## Regression Report Evidence" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Status | Candidate | Baseline | Delta | Message |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|---|---|---|" >> $GITHUB_STEP_SUMMARY
          jq -r '.evidence[]? | "| \(.metric) | \(.status) | \(.candidate) | \(.baseline) | \(.delta) | \(.message) |"' "$REPORT" >> $GITHUB_STEP_SUMMARY

          jq -r '.evidence[]? | select(.status == "fail") | "::error title=Regression Failed::Metric \(.metric): \(.message)"' "$REPORT"

          STATUS=$(jq -r .status "$REPORT")
          if [ "$STATUS" = "pass" ]; then
            echo "Regression passed."
            exit 0
          else
            echo "Regression failed or warning."
            exit 1
          fi