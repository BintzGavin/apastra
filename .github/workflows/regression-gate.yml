name: Regression Gate
on:
  pull_request:
    branches: [main]
  workflow_call:
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Fetch Artifacts Branch
        run: |
          git fetch origin promptops-artifacts || true
          git checkout origin/promptops-artifacts -- reports/regression_report.json || true
      - name: Check Regression Report Status
        run: |
          git fetch origin main || true
          CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || echo "")

          REQUIRES_EVAL=false
          if [ -n "$CHANGED_FILES" ]; then
            while IFS= read -r file; do
              if [[ "$file" == promptops/harnesses/* ]] || [[ "$file" == promptops/prompts/* ]] || [[ "$file" == promptops/datasets/* ]] || [[ "$file" == promptops/policies/* ]]; then
                REQUIRES_EVAL=true
                break
              fi
            done <<< "$CHANGED_FILES"
          fi

          if [ "$REQUIRES_EVAL" = false ] && [ -n "$CHANGED_FILES" ]; then
            echo "No evaluation-triggering files changed. Skipping regression check."
            exit 0
          fi

          REPORT="reports/regression_report.json"
          if [ ! -f "$REPORT" ]; then
            echo "::error::Regression report missing. Merges are blocked."
            exit 1
          fi
          STATUS=$(jq -r .status "$REPORT")
          if [ "$STATUS" = "pass" ]; then
            echo "Regression passed."
            exit 0
          else
            echo "Regression failed or warning."
            exit 1
          fi